    <rect x="74"  y="500" width="6" height="4" fill="#4db8ff" opacity="0.5"/>
    <rect x="60"  y="516" width="6" height="4" fill="#4db8ff" opacity="0.6"/>
    <rect x="74"  y="530" width="6" height="4" fill="#ff4da6" opacity="0.5"/>
    <rect x="90"  y="460" width="6" height="4" fill="#ff4da6" opacity="0.7"/>
    <rect x="104" y="460" width="6" height="4" fill="#4db8ff" opacity="0.5"/>
    <rect x="90"  y="476" width="6" height="4" fill="#4db8ff" opacity="0.8"/>
    <rect x="104" y="490" width="6" height="4" fill="#ff4da6" opacity="0.4"/>
    <rect x="160" y="515" width="6" height="4" fill="#4db8ff" opacity="0.6"/>
    <rect x="175" y="515" width="6" height="4" fill="#ff4da6" opacity="0.5"/>
    <rect x="160" y="530" width="6" height="4" fill="#4db8ff" opacity="0.4"/>
    <rect x="210" y="475" width="6" height="4" fill="#4db8ff" opacity="0.6"/>
    <rect x="225" y="475" width="6" height="4" fill="#ff4da6" opacity="0.4"/>
    <rect x="240" y="490" width="6" height="4" fill="#4db8ff" opacity="0.5"/>
    <rect x="320" y="440" width="6" height="4" fill="#4db8ff" opacity="0.7"/>
    <rect x="340" y="440" width="6" height="4" fill="#ff4da6" opacity="0.5"/>
    <rect x="320" y="458" width="6" height="4" fill="#4db8ff" opacity="0.4"/>
    <!-- Right building windows -->
    <rect x="840" y="475" width="6" height="4" fill="#4db8ff" opacity="0.7"/>
    <rect x="856" y="475" width="6" height="4" fill="#4db8ff" opacity="0.5"/>
    <rect x="840" y="491" width="6" height="4" fill="#ff4da6" opacity="0.6"/>
    <rect x="856" y="505" width="6" height="4" fill="#4db8ff" opacity="0.4"/>
    <rect x="900" y="445" width="6" height="4" fill="#ff4da6" opacity="0.5"/>
    <rect x="920" y="445" width="6" height="4" fill="#4db8ff" opacity="0.6"/>
    <rect x="950" y="495" width="6" height="4" fill="#4db8ff" opacity="0.5"/>
    <rect x="970" y="495" width="6" height="4" fill="#ff4da6" opacity="0.4"/>
    <rect x="1110" y="416" width="6" height="4" fill="#4db8ff" opacity="0.8"/>
    <rect x="1126" y="416" width="6" height="4" fill="#4db8ff" opacity="0.5"/>
    <rect x="1110" y="432" width="6" height="4" fill="#ff4da6" opacity="0.4"/>
    <rect x="1160" y="465" width="6" height="4" fill="#4db8ff" opacity="0.6"/>
    <rect x="1180" y="465" width="6" height="4" fill="#ff4da6" opacity="0.5"/>
    <rect x="1290" y="445" width="6" height="4" fill="#ff4da6" opacity="0.7"/>
    <rect x="1306" y="445" width="6" height="4" fill="#4db8ff" opacity="0.6"/>
    <rect x="1290" y="462" width="6" height="4" fill="#4db8ff" opacity="0.4"/>
    <rect x="1360" y="505" width="6" height="4" fill="#4db8ff" opacity="0.5"/>
    <rect x="1380" y="505" width="6" height="4" fill="#ff4da6" opacity="0.4"/>
  </g>
  <!-- Hanok roofline in foreground — more visible -->
  <g opacity="0.45" fill="#0a1840">
    <!-- Traditional curved roof shape -->
    <path d="M400,700 Q500,640 600,660 Q700,640 800,650 Q900,640 1000,660 L1000,720 L400,720 Z"/>
    <path d="M380,700 Q480,660 580,670 Q680,660 780,665 Q880,660 980,670 L980,715 L380,715 Z" fill="rgba(6,14,50,0.5)"/>
    <!-- Roof ridge ornaments -->
    <rect x="685" y="635" width="6" height="20" rx="1"/>
    <circle cx="688" cy="633" r="5"/>
  </g>
  <!-- Neon sign reflections on ground — brighter -->
  <ellipse cx="300" cy="820" rx="200" ry="30" fill="rgba(77,184,255,0.20)" filter="url(#blur-med)"/>
  <ellipse cx="1100" cy="810" rx="180" ry="25" fill="rgba(255,77,166,0.16)" filter="url(#blur-med)"/>
  <ellipse cx="700" cy="830" rx="250" ry="20" fill="rgba(77,184,255,0.14)" filter="url(#blur-med)"/>
  <!-- Stars -->
  <circle cx="200" cy="80"  r="1" fill="rgba(200,220,255,0.6)"/>
  <circle cx="450" cy="60"  r="1.5" fill="rgba(200,220,255,0.5)"/>
  <circle cx="700" cy="40"  r="1" fill="rgba(200,220,255,0.7)"/>
  <circle cx="900" cy="70"  r="1" fill="rgba(200,220,255,0.5)"/>
  <circle cx="1200" cy="50" r="1.5" fill="rgba(200,220,255,0.6)"/>
  <circle cx="1380" cy="90" r="1" fill="rgba(200,220,255,0.4)"/>
  <circle cx="100" cy="120" r="1" fill="rgba(200,220,255,0.4)"/>
  <circle cx="550" cy="100" r="1.2" fill="rgba(200,220,255,0.5)"/>
