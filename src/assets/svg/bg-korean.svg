<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="blur-heavy"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="blur-med"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur-soft"><feGaussianBlur stdDeviation="3"/></filter>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020510"/>
      <stop offset="60%" stop-color="#04091a"/>
      <stop offset="100%" stop-color="#060c22"/>
    </linearGradient>
  </defs>
  <!-- Night sky -->
  <rect width="1440" height="900" fill="url(#skyGrad)"/>
  <!-- City ambient glow from below — brighter -->
  <ellipse cx="720" cy="980" rx="900" ry="200" fill="rgba(50,140,255,0.22)" filter="url(#blur-heavy)"/>
  <ellipse cx="400" cy="960" rx="500" ry="150" fill="rgba(30,100,220,0.18)" filter="url(#blur-heavy)"/>
  <ellipse cx="1100" cy="940" rx="400" ry="120" fill="rgba(255,80,180,0.16)" filter="url(#blur-heavy)"/>
  <!-- Moon -->
  <circle cx="1200" cy="120" r="28" fill="rgba(220,240,255,0.15)" filter="url(#blur-med)"/>
  <circle cx="1200" cy="120" r="14" fill="rgba(240,250,255,0.28)"/>
  <!-- Distant Seoul skyline silhouette -->
  <!-- Lotte Tower (Jamsil) -->
  <polygon points="1050,150 1060,150 1068,350 1042,350" fill="rgba(20,50,120,0.65)"/>
  <rect x="1048" y="135" width="18" height="22" fill="rgba(20,50,120,0.65)"/>
  <polygon points="1053,125 1057,115 1061,125" fill="rgba(20,50,120,0.65)"/>
  <!-- N Seoul Tower — brighter beacon -->
  <rect x="660" y="280" width="10" height="160" fill="rgba(20,50,120,0.75)"/>
  <polygon points="655,280 671,280 663,250" fill="rgba(20,50,120,0.75)"/>
  <circle cx="665" cy="248" r="4" fill="rgba(255,80,100,0.85)"/>
  <circle cx="665" cy="248" r="8" fill="rgba(255,80,100,0.28)" filter="url(#blur-soft)"/>
  <circle cx="665" cy="248" r="14" fill="rgba(255,80,100,0.12)" filter="url(#blur-heavy)"/>
  <!-- Various building shapes - Seoul skyline — increased opacity -->
  <rect x="50"  y="480" width="80"  height="300" fill="rgba(15,35,90,0.72)"/>
  <rect x="80"  y="440" width="40"  height="340" fill="rgba(15,35,90,0.72)"/>
  <rect x="150" y="500" width="60"  height="280" fill="rgba(15,35,90,0.68)"/>
  <rect x="200" y="460" width="90"  height="320" fill="rgba(15,35,90,0.68)"/>
  <rect x="260" y="490" width="50"  height="290" fill="rgba(12,30,80,0.68)"/>
  <rect x="310" y="420" width="70"  height="360" fill="rgba(12,30,80,0.70)"/>
  <rect x="360" y="470" width="55"  height="310" fill="rgba(15,35,90,0.65)"/>
  <rect x="830" y="460" width="80"  height="320" fill="rgba(12,28,75,0.70)"/>
  <rect x="890" y="430" width="60"  height="350" fill="rgba(12,28,75,0.72)"/>
  <rect x="940" y="480" width="100" height="300" fill="rgba(15,35,90,0.68)"/>
  <rect x="1100" y="400" width="70" height="380" fill="rgba(12,30,80,0.72)"/>
  <rect x="1150" y="450" width="90" height="330" fill="rgba(12,28,75,0.68)"/>
  <rect x="1230" y="470" width="60" height="310" fill="rgba(15,35,90,0.65)"/>
  <rect x="1280" y="430" width="80" height="350" fill="rgba(12,30,80,0.70)"/>
  <rect x="1350" y="490" width="90" height="290" fill="rgba(12,28,75,0.68)"/>
